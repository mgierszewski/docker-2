<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Produkty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Lista produktów</h1>
    <nav>
        <a href="index.html">Strona główna</a> |
        <a href="products.html">Produkty</a> |
        <a href="stats.html">Statystyki</a>
    </nav>
    <div id="products-list"></div>
    <h2>Dodaj produkt</h2>
    <form id="add-product-form">
        <div class="form-row">
            <input type="text" id="product-name" placeholder="Nazwa produktu" required />
            <input type="number" id="product-price" placeholder="Cena (zł)" min="0" step="0.01" required />
        </div>
        <div class="form-row">
            <input type="text" id="product-manufacturer" placeholder="Producent" required />
            <input type="text" id="product-category" placeholder="Kategoria" required />
        </div>
        <div class="form-row">
            <input type="text" id="product-description" placeholder="Opis (opcjonalnie)" />
        </div>
        <button type="submit">Dodaj</button>
    </form>
    <script src="products.js"></script>
</body>
</html>
