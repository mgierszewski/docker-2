version: '3.8'
services:
  backend:
    build:
      context: ./Backend
    container_name: backend
    expose:
      - 3000
    networks:
      - appnet
  frontend:
    build:
      context: ./Frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - appnet
networks:
  appnet:
    driver: bridge
